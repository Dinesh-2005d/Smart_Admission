name: 📊 Combined Test Summary Report

on:
  workflow_run:
    workflows:
      - "🚀 Deploy to GitHub Pages + Selenium E2E Tests"
      - "🤖 Android Appium E2E Tests + Report Hosting"
      - "🔐 Security Review – SAST + Dependency Scan"
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  actions: read

env:
  PYTHON_VERSION: '3.11'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  combined-summary:
    name: 📊 Generate Combined Test Summary
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 📁 Create results directories
        run: |
          mkdir -p results/selenium results/appium results/security

      - name: 📥 Download Selenium test results
        uses: actions/github-script@v7
        with:
          script: |
            const artifacts = await github.rest.actions.listArtifactsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 50,
            });
            const sel = artifacts.data.artifacts
              .filter(a => a.name.startsWith('selenium-test-results'))
              .sort((a, b) => new Date(b.created_at) - new Date(a.created_at))[0];
            if (sel) {
              const dl = await github.rest.actions.downloadArtifact({
                owner: context.repo.owner,
                repo: context.repo.repo,
                artifact_id: sel.id,
                archive_format: 'zip',
              });
              const fs = require('fs');
              fs.writeFileSync('/tmp/selenium.zip', Buffer.from(dl.data));
              console.log(`Downloaded: ${sel.name}`);
            } else {
              console.log('No Selenium artifacts found');
            }
        continue-on-error: true

      - name: 📥 Unzip Selenium results
        run: |
          if [ -f /tmp/selenium.zip ]; then
            unzip -o /tmp/selenium.zip -d results/selenium/ 2>/dev/null || true
            find results/selenium -name "test-results.json" | head -1 | xargs -I{} cp {} results/selenium/test-results.json 2>/dev/null || true
            echo "Selenium results extracted"
          fi
        continue-on-error: true

      - name: 📥 Download Appium test results
        uses: actions/github-script@v7
        with:
          script: |
            const artifacts = await github.rest.actions.listArtifactsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 50,
            });
            const app = artifacts.data.artifacts
              .filter(a => a.name.startsWith('appium-test-results'))
              .sort((a, b) => new Date(b.created_at) - new Date(a.created_at))[0];
            if (app) {
              const dl = await github.rest.actions.downloadArtifact({
                owner: context.repo.owner,
                repo: context.repo.repo,
                artifact_id: app.id,
                archive_format: 'zip',
              });
              const fs = require('fs');
              fs.writeFileSync('/tmp/appium.zip', Buffer.from(dl.data));
              console.log(`Downloaded: ${app.name}`);
            } else {
              console.log('No Appium artifacts found');
            }
        continue-on-error: true

      - name: 📥 Unzip Appium results
        run: |
          if [ -f /tmp/appium.zip ]; then
            unzip -o /tmp/appium.zip -d results/appium/ 2>/dev/null || true
            find results/appium -name "test-results.json" | head -1 | xargs -I{} cp {} results/appium/test-results.json 2>/dev/null || true
            echo "Appium results extracted"
          fi
        continue-on-error: true

      - name: 📥 Download Security report
        uses: actions/github-script@v7
        with:
          script: |
            const artifacts = await github.rest.actions.listArtifactsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 50,
            });
            const sec = artifacts.data.artifacts
              .filter(a => a.name.startsWith('security-reports'))
              .sort((a, b) => new Date(b.created_at) - new Date(a.created_at))[0];
            if (sec) {
              const dl = await github.rest.actions.downloadArtifact({
                owner: context.repo.owner,
                repo: context.repo.repo,
                artifact_id: sec.id,
                archive_format: 'zip',
              });
              const fs = require('fs');
              fs.writeFileSync('/tmp/security.zip', Buffer.from(dl.data));
              console.log(`Downloaded: ${sec.name}`);
            } else {
              console.log('No Security artifacts found');
            }
        continue-on-error: true

      - name: 📥 Unzip Security results
        run: |
          if [ -f /tmp/security.zip ]; then
            unzip -o /tmp/security.zip -d results/security/ 2>/dev/null || true
            find results/security -name "security-review.md" | head -1 | xargs -I{} cp {} results/security/security-review.md 2>/dev/null || true
            echo "Security results extracted"
          fi
        continue-on-error: true

      - name: 📊 Generate Combined Report
        env:
          SELENIUM_RESULTS: results/selenium/test-results.json
          APPIUM_RESULTS: results/appium/test-results.json
          SECURITY_REPORT: results/security/security-review.md
          OUTPUT_REPORT: results/combined-summary.md
          GITHUB_STEP_SUMMARY: ${{ env.GITHUB_STEP_SUMMARY }}
        run: |
          python3 reports/generate_combined_report.py

      - name: 📋 Publish to GitHub Step Summary
        if: always()
        run: |
          REPORT="results/combined-summary.md"
          if [ -f "$REPORT" ]; then
            cat "$REPORT" >> "$GITHUB_STEP_SUMMARY"
            echo "Combined summary posted."
          else
            {
              echo "# Combined Test Summary"
              echo ""
              echo "No test results were available from this run."
              echo "Trigger the Selenium, Appium, and Security workflows first."
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: 📤 Upload Combined Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: combined-test-report-${{ github.run_number }}
          path: results/combined-summary.md
          retention-days: 30
          if-no-files-found: warn
