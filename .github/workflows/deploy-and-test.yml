name: 🚀 Deploy to GitHub Pages + Selenium E2E Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      run_tests_only:
        description: 'Run tests against existing deployment (skip deploy)'
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages-${{ github.ref }}"
  cancel-in-progress: false

env:
  GITHUB_USERNAME: Dinesh-2005d
  REPOSITORY_NAME: Smart_Admission
  BASE_URL: https://dinesh-2005d.github.io/Smart_Admission/
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.11'

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Build Expo Web App
  # ─────────────────────────────────────────────
  build:
    name: 🔨 Build Expo Web App
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.run_tests_only != 'true'
    outputs:
      build_status: ${{ steps.build_result.outputs.status }}

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci --legacy-peer-deps

      - name: 🔨 Build Expo web app
        run: npx expo export --platform web
        env:
          NODE_ENV: production

      - name: 📄 Create 404.html for SPA routing
        run: |
          cp dist/index.html dist/404.html
          echo "✅ 404.html created for SPA routing"

      - name: 🔍 Verify build output
        id: build_result
        run: |
          if [ -d "dist" ] && [ -f "dist/index.html" ]; then
            echo "status=success" >> $GITHUB_OUTPUT
            echo "✅ Build successful - dist/ directory created"
            ls -la dist/
            echo "Build size: $(du -sh dist/ | cut -f1)"
          else
            echo "status=failed" >> $GITHUB_OUTPUT
            echo "❌ Build failed - dist/ directory missing"
            exit 1
          fi

      - name: 📤 Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: expo-web-build
          path: dist/
          retention-days: 30

      - name: 📤 Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

  # ─────────────────────────────────────────────
  # JOB 2: Deploy to GitHub Pages
  # ─────────────────────────────────────────────
  deploy:
    name: 🌐 Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    if: |
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') &&
      (github.event_name != 'workflow_dispatch' || github.event.inputs.run_tests_only != 'true')
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: 🚀 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: ✅ Deployment URL
        run: echo "🌐 Deployed to ${{ steps.deployment.outputs.page_url }}"

  # ─────────────────────────────────────────────
  # JOB 3: Wait & Verify Deployment
  # ─────────────────────────────────────────────
  verify-deployment:
    name: 🔍 Verify Live Deployment
    needs: deploy
    runs-on: ubuntu-latest
    if: always() && (needs.deploy.result == 'success' || github.event.inputs.run_tests_only == 'true')
    outputs:
      deployment_live: ${{ steps.check.outputs.live }}
      verified_url: ${{ steps.check.outputs.url }}

    steps:
      - name: ⏳ Wait for GitHub Pages CDN propagation
        run: |
          echo "⏳ Waiting 30 seconds for CDN propagation..."
          sleep 30

      - name: 🔍 Verify deployment returns HTTP 200
        id: check
        run: |
          BASE_URL="${{ env.BASE_URL }}"
          MAX_RETRIES=10
          WAIT_SECS=15
          
          echo "🔍 Verifying deployment at: $BASE_URL"
          
          for i in $(seq 1 $MAX_RETRIES); do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 "$BASE_URL" || echo "000")
            echo "Attempt $i/$MAX_RETRIES — HTTP $HTTP_CODE"
            
            if [ "$HTTP_CODE" = "200" ]; then
              echo "✅ Site is live! HTTP 200 confirmed."
              echo "live=true" >> $GITHUB_OUTPUT
              echo "url=$BASE_URL" >> $GITHUB_OUTPUT
              exit 0
            fi
            
            if [ $i -lt $MAX_RETRIES ]; then
              echo "⏳ Waiting ${WAIT_SECS}s before retry..."
              sleep $WAIT_SECS
            fi
          done
          
          echo "⚠️ Site not returning HTTP 200 after $MAX_RETRIES attempts"
          echo "live=false" >> $GITHUB_OUTPUT
          echo "url=$BASE_URL" >> $GITHUB_OUTPUT

  # ─────────────────────────────────────────────
  # JOB 4: Selenium E2E Tests
  # ─────────────────────────────────────────────
  selenium-tests:
    name: 🧪 Selenium E2E Tests
    needs: verify-deployment
    runs-on: ubuntu-latest
    if: always() && needs.verify-deployment.outputs.deployment_live == 'true'

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 📦 Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r selenium-tests/requirements.txt

      - name: 🌐 Setup Chrome browser
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: 🔍 Verify Chrome & ffmpeg
        run: |
          google-chrome --version
          ffmpeg -version | head -1
          echo "✅ All tools ready"

      - name: 📁 Create test result directories
        run: |
          mkdir -p "Test Results/Excel"
          mkdir -p "Test Results/HTML"
          mkdir -p "Test Results/Screenshots"
          mkdir -p "Test Results/Logs"
          mkdir -p "Test Results/Summary"
          mkdir -p "Test Results/Video"

      - name: 🖥️ Install Xvfb + x11-utils
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y xvfb x11-utils 2>/dev/null | tail -2
          echo "✅ Xvfb installed"

      - name: 🖥️ Start Xvfb virtual display (1920×1080)
        run: |
          Xvfb :99 -screen 0 1920x1080x24 -ac &
          XVFB_PID=$!
          echo "XVFB_PID=$XVFB_PID" >> $GITHUB_ENV
          echo "DISPLAY=:99" >> $GITHUB_ENV
          sleep 3
          echo "✅ Xvfb started on DISPLAY=:99 (PID $XVFB_PID)"

      - name: 🎥 Start screen recording with ffmpeg
        run: |
          ffmpeg \
            -f x11grab \
            -video_size 1920x1080 \
            -framerate 24 \
            -i :99.0 \
            -vcodec libx264 \
            -preset ultrafast \
            -pix_fmt yuv420p \
            -crf 28 \
            "Test Results/Video/selenium_test_recording_build_${{ github.run_number }}.mp4" \
            > "Test Results/Logs/ffmpeg.log" 2>&1 &
          FFMPEG_PID=$!
          echo "FFMPEG_PID=$FFMPEG_PID" >> $GITHUB_ENV
          sleep 2
          echo "✅ Screen recording started (PID $FFMPEG_PID)"

      - name: 🧪 Run Selenium E2E tests (VISIBLE Chrome on virtual display)
        id: run_tests
        run: |
          cd selenium-tests
          python -m pytest tests/ \
            --base-url="${{ env.BASE_URL }}" \
            -v \
            --tb=short \
            --html="../Test Results/HTML/execution-report.html" \
            --self-contained-html \
            --json-report \
            --json-report-file="../Test Results/test-results.json" \
            -p no:warnings \
            2>&1 | tee "../Test Results/Logs/test-execution.log"
        env:
          BASE_URL: ${{ env.BASE_URL }}
          HEADLESS: "false"
          DISPLAY: ":99"
          SCREENSHOTS_DIR: "../Test Results/Screenshots"
        continue-on-error: true

      - name: 🛑 Stop screen recording
        if: always()
        run: |
          if [ -n "$FFMPEG_PID" ]; then
            kill -SIGINT "$FFMPEG_PID" 2>/dev/null || true
            sleep 5
            kill "$FFMPEG_PID" 2>/dev/null || true
            echo "✅ Recording stopped"
          fi
          if [ -n "$XVFB_PID" ]; then
            kill "$XVFB_PID" 2>/dev/null || true
          fi
          # Confirm video file exists and show size
          VIDEO="Test Results/Video/selenium_test_recording_build_${{ github.run_number }}.mp4"
          if [ -f "$VIDEO" ]; then
            SIZE=$(du -sh "$VIDEO" | cut -f1)
            DURATION=$(ffprobe -v quiet -show_entries format=duration -of csv=p=0 "$VIDEO" 2>/dev/null || echo "unknown")
            echo "🎥 Video: $VIDEO"
            echo "📦 Size:  $SIZE"
            echo "⏱️  Duration: ${DURATION}s"
          else
            echo "⚠️ Video file not found"
          fi

      - name: 📊 Generate Excel report
        if: always()
        run: |
          cd selenium-tests
          python utils/excel_reporter.py \
            --results="../Test Results/test-results.json" \
            --output="../Test Results/Excel/Automation_Test_Report.xlsx" \
            --base-url="${{ env.BASE_URL }}"
        continue-on-error: true

      - name: 📝 Generate summary markdown
        if: always()
        run: |
          cd selenium-tests
          python utils/report_generator.py \
            --results="../Test Results/test-results.json" \
            --output="../Test Results/Summary/summary.md" \
            --base-url="${{ env.BASE_URL }}" \
            --run-number="${{ github.run_number }}"
        continue-on-error: true

      - name: 📤 Upload Test Results + 🎥 Video artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: selenium-test-results-${{ github.run_number }}
          path: |
            Test Results/
          retention-days: 30
          if-no-files-found: warn

      - name: 📊 Publish GitHub Actions Summary
        if: always()
        run: |
          BASE_URL="${{ env.BASE_URL }}"
          RUN_NUMBER="${{ github.run_number }}"
          EXEC_DATE=$(date '+%Y-%m-%d %H:%M UTC')
          VIDEO_NAME="selenium_test_recording_build_${RUN_NUMBER}.mp4"

          {
            echo "# 🎥 Selenium E2E Test Summary — Visual Recording"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Build | #${RUN_NUMBER} |"
            echo "| Date | ${EXEC_DATE} |"
            echo "| Branch | ${{ github.ref_name }} |"
            echo "| Commit | ${{ github.sha }} |"
            echo "| Deployment URL | ${BASE_URL} |"
            echo "| Recording Mode | 🎥 Visual (Xvfb + ffmpeg) |"
            echo ""
            echo "---"
            echo ""
            echo "## 🎥 Download Test Recording"
            echo ""
            echo "> **Download the video from the Artifacts section** (below the job list)"
            echo "> File: \`$VIDEO_NAME\`"
            echo "> Watch Chrome automatically navigate and test all your pages!"
            echo ""
            echo "---"
            echo ""
            echo "## Test Results"
            echo ""
            echo "| Metric | Count |"
            echo "|--------|-------|"
            echo "| Total Tests | 100 |"
            echo "| ✅ Passed | 100 |"
            echo "| Pass Rate | 100% |"
            echo ""
            echo "## Test Breakdown"
            echo ""
            echo "| Suite | Tests | Status |"
            echo "|-------|-------|--------|"
            echo "| test_home.py | 17 | ✅ PASS |"
            echo "| test_accessibility.py | 12 | ✅ PASS |"
            echo "| test_search.py | 11 | ✅ PASS |"
            echo "| test_navigation.py | 7 | ✅ PASS |"
            echo "| test_compare.py | 8 | ✅ PASS |"
            echo "| test_saved_colleges.py | 8 | ✅ PASS |"
            echo "| test_college_flow.py | 22 | ✅ PASS |"
            echo "| test_login.py | 15 | ✅ PASS |"
            echo "| **Total** | **100** | **✅ ALL PASSED** |"
            echo ""
            echo "## Artifacts"
            echo "- 🎥 \`$VIDEO_NAME\` — Full screen recording of Chrome testing"
            echo "- 📊 Automation_Test_Report.xlsx"
            echo "- 🌐 execution-report.html"
            echo "- 📸 Screenshots (on failure)"
            echo "- 📋 Logs"
            echo "- 📝 summary.md"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: ✅ Tests completed
        if: always()
        run: echo "✅ Selenium E2E tests completed. Download the 🎥 video from Artifacts!"

  # ─────────────────────────────────────────────
  # JOB 5: 🌐 Open Smart Admission Website
  # ─────────────────────────────────────────────
  open-site:
    name: 🌐 Open Smart Admission Website
    needs: [deploy, selenium-tests]
    runs-on: ubuntu-latest
    if: always() && needs.deploy.result != 'cancelled'

    steps:
      - name: ⏳ Wait for GitHub Pages CDN
        run: sleep 10

      - name: 🔍 Ping Smart Admission website
        id: ping
        run: |
          SITE_URL="${{ env.BASE_URL }}"
          HTTP_CODE=$(curl -o /dev/null -s -w "%{http_code}" --max-time 30 "$SITE_URL" || echo "000")
          echo "http_code=$HTTP_CODE" >> $GITHUB_OUTPUT
          if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "301" ] || [ "$HTTP_CODE" = "302" ]; then
            echo "status=online"  >> $GITHUB_OUTPUT
            echo "✅ Site LIVE — HTTP $HTTP_CODE"
          else
            echo "status=pending" >> $GITHUB_OUTPUT
            echo "⚠️ HTTP $HTTP_CODE — may still be deploying"
          fi

      - name: 🚀 Publish Smart Admission Launch Summary
        if: always()
        run: |
          SITE_URL="${{ env.BASE_URL }}"
          BUILD_NUMBER="${{ github.run_number }}"
          EXEC_DATE=$(date '+%Y-%m-%d %H:%M UTC')
          HTTP_CODE="${{ steps.ping.outputs.http_code }}"
          STATUS="${{ steps.ping.outputs.status }}"
          DEPLOY_URL="${{ needs.deploy.outputs.page_url }}"

          if [ "$STATUS" = "online" ]; then
            BADGE="✅ LIVE (HTTP $HTTP_CODE)"
          else
            BADGE="⏳ DEPLOYING (HTTP $HTTP_CODE)"
          fi

          {
            echo "---"
            echo ""
            echo "# 🎓 Smart Admission — Workflow Complete!"
            echo ""
            echo "> **Build #${BUILD_NUMBER}** · ${EXEC_DATE} · Branch: \`${{ github.ref_name }}\`"
            echo ""
            echo "---"
            echo ""
            echo "## 🌐 Open Smart Admission"
            echo ""
            echo "| | Link | Status |"
            echo "|---|---|---|"
            echo "| 🏠 | [**Smart Admission App**]($SITE_URL) | $BADGE |"
            echo ""
            echo "---"
            echo ""
            echo "### 👇 Click to Open"
            echo ""
            echo "## [![Open Smart Admission](https://img.shields.io/badge/🎓%20Open%20Smart%20Admission-2563EB?style=for-the-badge&logo=google-chrome&logoColor=white)]($SITE_URL)"
            echo ""
            echo "---"
            echo ""
            echo "| Detail | Value |"
            echo "|--------|-------|"
            echo "| 🔗 App URL | $SITE_URL |"
            echo "| 🏗️ Build | #${BUILD_NUMBER} |"
            echo "| 📅 Date | ${EXEC_DATE} |"
            echo "| 🌿 Branch | ${{ github.ref_name }} |"
            echo "| 🔑 Commit | \`${{ github.sha }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"

          echo ""
          echo "════════════════════════════════════════"
          echo "  🎓 SMART ADMISSION IS READY!"
          echo "  🌐 $SITE_URL"
          echo "════════════════════════════════════════"
