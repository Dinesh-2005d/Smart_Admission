[pytest]
testpaths = tests
addopts =
    -v
    --tb=short
    --strict-markers
    -p no:warnings

markers =
    smoke:        Fast sanity checks — run on every push
    regression:   Full regression suite — runs on CI
    accessibility: Accessibility and SEO checks
    navigation:   Navigation flow tests (tab switching, routing)
    compare:      Compare screen tests
    saved:        Saved colleges tab tests
    college_flow: College discovery flow (marks entry → college list)
    seo:          SEO / meta-tag / responsive-viewport checks
    performance:  Page load performance thresholds

log_cli = true
log_cli_level = INFO
